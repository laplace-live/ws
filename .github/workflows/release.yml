name: Release

permissions:
  # https://docs.npmjs.com/trusted-publishers
  contents: read
  id-token: write

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: sudo npm install -g npm@latest

      - name: Check if version is already published
        id: check
        run: |
          PACKAGE_VERSION=$(jq -r .version package.json)
          PUBLISHED=$(npm view "${{ vars.NPM_PACKAGE_NAME || '@laplace.live/ws' }}@${PACKAGE_VERSION}" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$PACKAGE_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "v${PACKAGE_VERSION} is already published, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "v${PACKAGE_VERSION} not found on npm, will publish."
          fi

      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        run: bun publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ""
