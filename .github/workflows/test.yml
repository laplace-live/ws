name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bunx playwright install chromium --with-deps

      - run: bun test
        env:
          TEST_AUTH_BODY_URL: ${{ secrets.TEST_AUTH_BODY_URL }}
          TEST_LIVE_SEND_URL: ${{ secrets.TEST_LIVE_SEND_URL }}
          TEST_LOGIN_SYNC_TOKEN: ${{ secrets.TEST_LOGIN_SYNC_TOKEN }}
